<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hanken Grotesk', sans-serif;
      font-size: 14px;
      background: #fff;
      color: #333;
    }

    /* Post title — largest element in the hierarchy */
    .post-entry > h2 {
      font-size: 2em;
      font-weight: 800;
      color: #111;
      margin-bottom: 6px;
      line-height: 1.2;
    }

    /* Section headings inside post body (## level) — uppercase label style */
    .post-body h2 {
      font-size: 0.72em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: #555;
      margin-top: 2.8em;
      margin-bottom: 1em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .post-body h2 .section-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* Subsection headings (### level) */
    .post-body h3 {
      font-size: 1.05em;
      font-weight: 600;
      color: #222;
      margin-top: 2em;
      margin-bottom: 0.6em;
    }

    /* Layout */
    .site-container {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      min-width: 240px;
      background: #f0f0f0;
      padding: 25px 18px;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      overflow-y: auto;
      border-right: 1px solid #ddd;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }

    .sidebar-header img {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .sidebar-header .name {
      font-size: 1em;
      font-weight: 700;
      color: #222;
    }

    .sidebar-desc {
      font-style: italic;
      font-size: 0.85em;
      color: #666;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .sidebar a {
      color: #0066cc;
      text-decoration: none;
    }

    .sidebar a:hover {
      text-decoration: underline;
    }

    .social-links {
      margin-bottom: 20px;
    }

    .social-link {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 9px;
      font-size: 0.85em;
      color: #999;
      text-decoration: none;
    }

    .social-link:hover {
      color: #555;
      text-decoration: none;
    }

    .social-link svg {
      flex-shrink: 0;
    }

    .sidebar h4 {
      font-size: 0.8em;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin-bottom: 10px;
    }

    .sidebar .post-links a {
      display: block;
      margin-bottom: 8px;
      font-size: 0.85em;
      color: #444;
    }

    /* Main content */
    .main-content {
      margin-left: 240px;
      padding: 40px 50px;
      flex: 1;
      max-width: 800px;
    }

    /* Hamburger — hidden on desktop */
    .hamburger { display: none; }

    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.45);
      z-index: 999;
    }

    .overlay.open { display: block; }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        z-index: 1000;
      }
      .sidebar.open { transform: translateX(0); }
      .main-content {
        margin-left: 0;
        padding: 60px 20px 30px;
      }
      .hamburger {
        display: block;
        position: fixed;
        top: 14px; left: 14px;
        z-index: 1001;
        background: #2a2a2a;
        color: #fff;
        border: none;
        padding: 7px 11px;
        font-size: 1.2em;
        cursor: pointer;
        border-radius: 4px;
        line-height: 1;
      }
    }

    .post-entry {
      margin-bottom: 40px;
      padding-bottom: 30px;
      border-bottom: 1px solid #eee;
    }

    .post-date {
      color: #999;
      font-size: 0.82em;
      display: block;
      margin-bottom: 20px;
    }

    .post-body p {
      margin-bottom: 1.8em;
      line-height: 1.7;
      color: #444;
    }

    .post-body strong {
      display: block;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      font-size: 1.05em;
      font-weight: 700;
      color: #222;
    }

    .post-body ul {
      margin: 0.5em 0 1.8em 2em;
      padding: 0;
    }

    .post-body ul li {
      margin-bottom: 0.4em;
      line-height: 1.6;
      color: #444;
    }

    .post-body pre {
      background: #f5f5f5;
      padding: 16px;
      border-radius: 4px;
      overflow-x: auto;
      margin-bottom: 1.8em;
      font-size: 0.85em;
      line-height: 1.5;
    }

    .post-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.8em;
      font-size: 0.9em;
    }

    .post-body table th {
      background: #f0f0f0;
      padding: 8px 12px;
      text-align: left;
      border: 1px solid #ddd;
      font-weight: 700;
    }

    .post-body table td {
      padding: 8px 12px;
      border: 1px solid #ddd;
      color: #444;
    }

    .post-body table tr:nth-child(even) {
      background: #fafafa;
    }

    /* POC italic paragraphs */
    .post-body p > em:only-child {
      font-style: italic;
      color: #777;
      font-size: 0.93em;
    }
  </style>
</head>
<body>
  <button class="hamburger" id="hamburger">&#9776;</button>
  <div class="overlay" id="overlay"></div>

  <div class="site-container">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">
        <img src="{{ '/assets/profile.jpeg' | relative_url }}" alt="Profile photo">
        <span class="name">{{ site.title }}</span>
      </div>

      <p class="sidebar-desc">{{ site.description }}</p>

      <div class="social-links">
        <a class="social-link" href="https://www.linkedin.com/in/andrew-leatt-hayter-b36023b2/" target="_blank">
          <svg width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" fill="#9ca3af"/></svg>
          Andrew Leatt-Hayter
        </a>
        <a class="social-link" href="https://github.com/aleatthayter" target="_blank">
          <svg width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z" fill="#9ca3af"/></svg>
          aleatthayter
        </a>
        <a class="social-link" href="mailto:aleatthayter@gmail.com">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="4" width="20" height="16" rx="2" stroke="#9ca3af" stroke-width="2"/><path d="M2 7l10 7 10-7" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/></svg>
          aleatthayter@gmail.com
        </a>
      </div>

      <h4>Previous Posts</h4>
      <div class="post-links">
        {% for post in site.posts %}
          <a href="#{{ post.title | slugify }}">{{ post.title }}</a>
        {% endfor %}
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      {% for post in site.posts %}
        <div class="post-entry" id="{{ post.title | slugify }}">
          <h2>{{ post.title }}</h2>
          <span class="post-date">{{ post.date | date: "%B %d, %Y" }}</span>
          <div class="post-body">{{ post.content }}</div>
        </div>
      {% endfor %}
    </div>

  </div>

  <script>
    // Hamburger menu
    const hamburger = document.getElementById('hamburger');
    const sidebar   = document.querySelector('.sidebar');
    const overlay   = document.getElementById('overlay');

    hamburger.addEventListener('click', function() {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('open');
    });

    overlay.addEventListener('click', function() {
      sidebar.classList.remove('open');
      overlay.classList.remove('open');
    });

    // Section icons: inject dark-grey circle + white SVG icon before each ## heading
    const SECTION_ICONS = {
      'The Challenge':
        '<svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="13" cy="13" r="13" fill="#2a2a2a"/><line x1="13" y1="7" x2="13" y2="16" stroke="white" stroke-width="2.2" stroke-linecap="round"/><circle cx="13" cy="20" r="1.5" fill="white"/></svg>',
      'How It Works':
        '<svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="13" cy="13" r="13" fill="#2a2a2a"/><g transform="translate(5,5) scale(0.667)"><path d="M12.22 2h-.44a2 2 0 00-2 2v.18a2 2 0 01-1 1.73l-.43.25a2 2 0 01-2 0l-.15-.08a2 2 0 00-2.73.73l-.22.38a2 2 0 00.73 2.73l.15.1a2 2 0 011 1.72v.51a2 2 0 01-1 1.74l-.15.09a2 2 0 00-.73 2.73l.22.38a2 2 0 002.73.73l.15-.08a2 2 0 012 0l.43.25a2 2 0 011 1.73V20a2 2 0 002 2h.44a2 2 0 002-2v-.18a2 2 0 011-1.73l.43-.25a2 2 0 012 0l.15.08a2 2 0 002.73-.73l.22-.39a2 2 0 00-.73-2.73l-.15-.08a2 2 0 01-1-1.74v-.5a2 2 0 011-1.74l.15-.09a2 2 0 00.73-2.73l-.22-.38a2 2 0 00-2.73-.73l-.15.08a2 2 0 01-2 0l-.43-.25a2 2 0 01-1-1.73V4a2 2 0 00-2-2z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="white" stroke-width="2"/></g></svg>',
      'Why It Matters':
        '<svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="13" cy="13" r="13" fill="#2a2a2a"/><g transform="translate(5,5) scale(0.667)"><path d="M12 19V5M5 12l7-7 7 7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></g></svg>',
      'The Agent in Action':
        '<svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="13" cy="13" r="13" fill="#2a2a2a"/><g transform="translate(5,5) scale(0.667)"><circle cx="11" cy="11" r="7" stroke="white" stroke-width="2"/><path d="M20 20l-3.5-3.5" stroke="white" stroke-width="2" stroke-linecap="round"/></g></svg>',
    };

    document.querySelectorAll('.post-body h2').forEach(function(h2) {
      const text = h2.textContent.trim();
      if (SECTION_ICONS[text]) {
        var span = document.createElement('span');
        span.className = 'section-icon';
        span.innerHTML = SECTION_ICONS[text];
        h2.insertBefore(span, h2.firstChild);
      }
    });
  </script>
</body>
</html>
