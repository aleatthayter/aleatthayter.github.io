<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <style>
    /* Reset */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* Font */
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 13px;
      background: #fff;
      color: #333;
    }

    h1 { font-size: 1.8em; margin-bottom: 10px; }
    h2 { font-size: 1.4em; margin-bottom: 6px; }
    h3 { font-size: 1.2em; }

    /* Layout */
    .site-container {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      min-width: 240px;
      background: #f0f0f0;
      padding: 25px 18px;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      overflow-y: auto;
      border-right: 1px solid #ddd;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }

    .sidebar-header img {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .sidebar-header .name {
      font-size: 1em;
      font-weight: bold;
      color: #222;
    }

    .sidebar-desc {
      font-style: italic;
      font-size: 0.85em;
      color: #666;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .sidebar a {
      color: #0066cc;
      text-decoration: none;
    }

    .sidebar a:hover {
      text-decoration: underline;
    }

    .linkedin-link {
      display: block;
      margin-bottom: 20px;
      font-size: 0.9em;
    }

    .sidebar h4 {
      font-size: 0.8em;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin-bottom: 10px;
    }

    .sidebar .post-links a {
      display: block;
      margin-bottom: 8px;
      font-size: 0.85em;
      color: #444;
    }

    /* Main content */
    .main-content {
      margin-left: 240px;
      padding: 40px 50px;
      flex: 1;
      max-width: 800px;
    }

    /* Hamburger button — hidden on desktop */
    .hamburger {
      display: none;
    }

    /* Overlay — hidden by default */
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.45);
      z-index: 999;
    }

    .overlay.open {
      display: block;
    }

    /* Mobile layout */
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        z-index: 1000;
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .main-content {
        margin-left: 0;
        padding: 60px 20px 30px;
      }

      .hamburger {
        display: block;
        position: fixed;
        top: 14px;
        left: 14px;
        z-index: 1001;
        background: #2a2a2a;
        color: #fff;
        border: none;
        padding: 7px 11px;
        font-size: 1.2em;
        cursor: pointer;
        border-radius: 4px;
        line-height: 1;
      }
    }

    .post-entry {
      margin-bottom: 40px;
      padding-bottom: 30px;
      border-bottom: 1px solid #eee;
    }

    .post-entry h2 {
      color: #222;
      margin-bottom: 6px;
    }

    .post-date {
      color: #999;
      font-size: 0.82em;
      display: block;
      margin-bottom: 16px;
    }

    /* Post body */
    .post-body p {
      margin-bottom: 1.8em;
      line-height: 1.6;
      color: #444;
    }

    .post-body strong {
      display: block;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      font-size: 1.1em;
      color: #222;
    }

    .post-body ul {
      margin: 0.5em 0 1.8em 2em;
      padding: 0;
    }

    .post-body ul li {
      margin-bottom: 0.3em;
      line-height: 1.5;
      color: #444;
    }

    .post-body pre {
      background: #f5f5f5;
      padding: 16px;
      border-radius: 4px;
      overflow-x: auto;
      margin-bottom: 1.8em;
      font-size: 0.85em;
      line-height: 1.5;
    }

    .post-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.8em;
      font-size: 0.9em;
    }

    .post-body table th {
      background: #f0f0f0;
      padding: 8px 12px;
      text-align: left;
      border: 1px solid #ddd;
      font-weight: bold;
    }

    .post-body table td {
      padding: 8px 12px;
      border: 1px solid #ddd;
      color: #444;
    }

    .post-body table tr:nth-child(even) {
      background: #fafafa;
    }

  </style>
</head>
<body>
  <button class="hamburger" id="hamburger">&#9776;</button>
  <div class="overlay" id="overlay"></div>

  <div class="site-container">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">
        <img src="{{ '/assets/profile.jpeg' | relative_url }}" alt="Profile photo">
        <span class="name">{{ site.title }}</span>
      </div>

      <p class="sidebar-desc">{{ site.description }}</p>

      <a class="linkedin-link" href="https://www.linkedin.com/in/andrew-leatt-hayter-b36023b2/" target="_blank">
        🔗 LinkedIn
      </a>

      <h4>Previous Posts</h4>
      <div class="post-links">
        {% for post in site.posts %}
          <a href="#{{ post.title | slugify }}">{{ post.title }}</a>
        {% endfor %}
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      {% for post in site.posts %}
        <div class="post-entry" id="{{ post.title | slugify }}">
          <h2>{{ post.title }}</h2>
          <span class="post-date">{{ post.date | date: "%B %d, %Y" }}</span>
          <div class="post-body">{{ post.content }}</div>
        </div>
      {% endfor %}
    </div>

  </div>
  <script>
    const hamburger = document.getElementById('hamburger');
    const sidebar = document.querySelector('.sidebar');
    const overlay = document.getElementById('overlay');

    hamburger.addEventListener('click', function() {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('open');
    });

    overlay.addEventListener('click', function() {
      sidebar.classList.remove('open');
      overlay.classList.remove('open');
    });
  </script>
</body>
</html>
