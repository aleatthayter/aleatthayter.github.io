<svg width="760" height="534" viewBox="0 0 760 534" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="760" height="534" fill="white"/>

  <!-- SAP Work Orders -->
  <rect x="180" y="12" width="400" height="62" rx="12" fill="rgba(219,234,254,0.7)" stroke="#1a1a1a" stroke-width="1.5"/>
  <g transform="translate(196,23)">
    <rect width="14" height="18" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1.3"/>
    <line x1="3" y1="6" x2="11" y2="6" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="3" y1="10" x2="11" y2="10" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="3" y1="14" x2="9" y2="14" stroke="#1a1a1a" stroke-width="1"/>
  </g>
  <text x="390" y="38" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#111827">SAP Work Orders</text>
  <text x="390" y="57" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="11" fill="#4b5563">Priority, area, duration, crew, access requirements</text>

  <!-- Arrow -->
  <line x1="380" y1="74" x2="380" y2="90" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Group by Area & Access -->
  <rect x="180" y="93" width="400" height="62" rx="12" fill="rgba(237,233,254,0.7)" stroke="#1a1a1a" stroke-width="1.5"/>
  <g transform="translate(193,104)">
    <polygon points="10,0 12,8 20,10 12,12 10,20 8,12 0,10 8,8" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>
  </g>
  <text x="390" y="119" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#111827">Group by Area &amp; Access Needs</text>
  <text x="390" y="138" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="11" fill="#4b5563">Scaffolding erected once, isolations applied once per group</text>

  <!-- Arrow -->
  <line x1="380" y1="155" x2="380" y2="171" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Sequence by Priority -->
  <rect x="180" y="174" width="400" height="62" rx="12" fill="rgba(237,233,254,0.7)" stroke="#1a1a1a" stroke-width="1.5"/>
  <g transform="translate(193,185)">
    <polygon points="10,0 12,8 20,10 12,12 10,20 8,12 0,10 8,8" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>
  </g>
  <text x="390" y="200" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#111827">Sequence by Priority Within Groups</text>
  <text x="390" y="219" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="11" fill="#4b5563">Critical tasks completed before the window closes</text>

  <!-- Arrow -->
  <line x1="380" y1="236" x2="380" y2="252" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- AI Rewrites Field Instructions -->
  <rect x="180" y="255" width="400" height="62" rx="12" fill="rgba(237,233,254,0.7)" stroke="#1a1a1a" stroke-width="1.5"/>
  <g transform="translate(193,266)">
    <polygon points="10,0 12,8 20,10 12,12 10,20 8,12 0,10 8,8" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>
  </g>
  <text x="390" y="281" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#111827">AI Rewrites Field Instructions</text>
  <text x="390" y="300" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="11" fill="#4b5563">SAP shorthand into clear, actionable field instructions</text>

  <!-- Arrow -->
  <line x1="380" y1="317" x2="380" y2="333" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Flag Overrun Risk -->
  <rect x="180" y="336" width="400" height="62" rx="12" fill="rgba(237,233,254,0.7)" stroke="#1a1a1a" stroke-width="1.5"/>
  <g transform="translate(193,347)">
    <polygon points="10,0 12,8 20,10 12,12 10,20 8,12 0,10 8,8" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>
  </g>
  <text x="390" y="362" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#111827">Flag Overrun Risk &amp; Assign Start Times</text>
  <text x="390" y="381" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="11" fill="#4b5563">Planned start/end times against the shutdown window</text>

  <!-- Route left-down to Excel Output, then sequential right arrows -->
  <line x1="380" y1="398" x2="380" y2="418" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="380" y1="418" x2="132" y2="418" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="132" y1="418" x2="132" y2="427" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Excel Output -->
  <rect x="20" y="427" width="225" height="62" rx="12" fill="rgba(220,252,231,0.7)" stroke="#1a1a1a" stroke-width="1.5"/>
  <g transform="translate(36,438)">
    <rect width="14" height="18" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1.3"/>
    <line x1="3" y1="6" x2="11" y2="6" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="3" y1="10" x2="11" y2="10" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="3" y1="14" x2="9" y2="14" stroke="#1a1a1a" stroke-width="1"/>
  </g>
  <text x="132" y="453" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#111827">Excel Output</text>
  <text x="132" y="472" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="11" fill="#4b5563">Structured plan, compatible with P6</text>

  <!-- Arrow Excel -> Planner -->
  <line x1="245" y1="458" x2="262" y2="458" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Planner Review -->
  <rect x="265" y="427" width="220" height="62" rx="12" fill="rgba(254,243,199,0.7)" stroke="#1a1a1a" stroke-width="1.5"/>
  <g transform="translate(279,438)">
    <circle cx="10" cy="7" r="6" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M1,26 Q1,18 10,18 Q19,18 19,26" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
  <text x="375" y="453" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#111827">Planner Review</text>
  <text x="375" y="472" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="11" fill="#4b5563">Human approval</text>

  <!-- Arrow Planner -> P6 -->
  <line x1="485" y1="458" x2="502" y2="458" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- P6 Ready -->
  <rect x="505" y="427" width="235" height="62" rx="12" fill="rgba(220,252,231,0.7)" stroke="#1a1a1a" stroke-width="1.5"/>
  <g transform="translate(519,438)">
    <circle cx="10" cy="10" r="9" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <polyline points="4,10 8,14 16,6" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  </g>
  <text x="622" y="453" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#111827">P6 Ready</text>
  <text x="622" y="472" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="11" fill="#4b5563">Scheduling tool</text>

  <!-- Legend -->
  <text x="20" y="520" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="10" font-weight="600" fill="#6b7280">Key</text>
  <circle cx="52" cy="516" r="5" fill="rgba(219,234,254,0.7)" stroke="#1a1a1a" stroke-width="1"/>
  <text x="62" y="520" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="10" fill="#6b7280">Input / Data</text>
  <circle cx="140" cy="516" r="5" fill="rgba(237,233,254,0.7)" stroke="#1a1a1a" stroke-width="1"/>
  <text x="150" y="520" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="10" fill="#6b7280">AI Processing</text>
  <circle cx="238" cy="516" r="5" fill="rgba(254,243,199,0.7)" stroke="#1a1a1a" stroke-width="1"/>
  <text x="248" y="520" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="10" fill="#6b7280">Human Review</text>
  <circle cx="336" cy="516" r="5" fill="rgba(220,252,231,0.7)" stroke="#1a1a1a" stroke-width="1"/>
  <text x="346" y="520" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="10" fill="#6b7280">Output</text>
</svg>
