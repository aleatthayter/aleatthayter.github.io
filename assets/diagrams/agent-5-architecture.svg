<svg width="760" height="530" viewBox="0 0 760 530" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="760" height="530" fill="white"/>

  <!-- Permit Submission -->
  <rect x="180" y="12" width="400" height="62" rx="12" fill="rgba(219,234,254,0.7)" stroke="#1a1a1a" stroke-width="1.5"/>
  <g transform="translate(196,23)">
    <rect width="14" height="18" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1.3"/>
    <line x1="3" y1="6" x2="11" y2="6" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="3" y1="10" x2="11" y2="10" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="3" y1="14" x2="9" y2="14" stroke="#1a1a1a" stroke-width="1"/>
  </g>
  <text x="390" y="38" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#111827">Permit Submission</text>
  <text x="390" y="57" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="11" fill="#4b5563">Type, location, evidence submitted per required condition</text>

  <!-- Arrow -->
  <line x1="380" y1="74" x2="380" y2="90" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- LLM Assesses Each Condition -->
  <rect x="180" y="93" width="400" height="62" rx="12" fill="rgba(237,233,254,0.7)" stroke="#1a1a1a" stroke-width="1.5"/>
  <g transform="translate(193,104)">
    <polygon points="10,0 12,8 20,10 12,12 10,20 8,12 0,10 8,8" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>
  </g>
  <text x="390" y="119" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#111827">LLM Assesses Each Condition Against Evidence</text>
  <text x="390" y="138" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="11" fill="#4b5563">Pydantic structured output: satisfied true / false per condition</text>

  <!-- Arrow -->
  <line x1="380" y1="155" x2="380" y2="171" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Code Computes Approval -->
  <rect x="180" y="174" width="400" height="80" rx="12" fill="rgba(254,243,199,0.7)" stroke="#1a1a1a" stroke-width="1.5"/>
  <g transform="translate(193,187)">
    <rect width="18" height="14" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1.3"/>
    <line x1="3" y1="5" x2="9" y2="5" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="3" y1="9" x2="15" y2="9" stroke="#1a1a1a" stroke-width="1"/>
  </g>
  <text x="390" y="200" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#111827">Code Computes the Approval Decision</text>
  <text x="390" y="219" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="11" fill="#4b5563">The model cannot approve: only the code can</text>
  <rect x="220" y="228" width="320" height="20" rx="4" fill="rgba(0,0,0,0.06)" stroke="none"/>
  <text x="380" y="242" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="11" fill="#374151">approved = all(c.satisfied for c in assessment.conditions)</text>

  <!-- Two-way split -->
  <line x1="380" y1="254" x2="380" y2="266" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="190" y1="266" x2="550" y2="266" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="190" y1="266" x2="190" y2="280" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="550" y1="266" x2="550" y2="280" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Approved -->
  <rect x="20" y="283" width="340" height="62" rx="12" fill="rgba(220,252,231,0.7)" stroke="#1a1a1a" stroke-width="1.5"/>
  <g transform="translate(34,293)">
    <circle cx="10" cy="10" r="9" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <polyline points="4,10 8,14 16,6" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  </g>
  <text x="190" y="309" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#111827">Approved</text>
  <text x="190" y="328" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="11" fill="#4b5563">All required conditions satisfied</text>

  <!-- Blocked -->
  <rect x="380" y="283" width="340" height="62" rx="12" fill="rgba(254,226,226,0.7)" stroke="#1a1a1a" stroke-width="1.5"/>
  <g transform="translate(394,293)">
    <circle cx="10" cy="10" r="9" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="5" y1="5" x2="15" y2="15" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="15" y1="5" x2="5" y2="15" stroke="#1a1a1a" stroke-width="2"/>
  </g>
  <text x="550" y="309" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#111827">Blocked</text>
  <text x="550" y="328" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="11" fill="#4b5563">List of unsatisfied conditions returned</text>

  <!-- Collector back to centre -->
  <line x1="190" y1="345" x2="190" y2="362" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="550" y1="345" x2="550" y2="362" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="190" y1="362" x2="550" y2="362" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="380" y1="362" x2="380" y2="376" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Validation Report to Excel -->
  <rect x="180" y="379" width="400" height="62" rx="12" fill="rgba(220,252,231,0.7)" stroke="#1a1a1a" stroke-width="1.5"/>
  <g transform="translate(196,390)">
    <rect width="14" height="18" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1.3"/>
    <line x1="3" y1="6" x2="11" y2="6" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="3" y1="10" x2="11" y2="10" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="3" y1="14" x2="9" y2="14" stroke="#1a1a1a" stroke-width="1"/>
  </g>
  <text x="390" y="405" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#111827">Validation Report to Excel</text>
  <text x="390" y="424" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="11" fill="#4b5563">Per-condition breakdown: evidence, assessment, pass / fail</text>

  <!-- Legend -->
  <text x="20" y="472" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="10" font-weight="600" fill="#6b7280">Key</text>
  <circle cx="52" cy="468" r="5" fill="rgba(219,234,254,0.7)" stroke="#1a1a1a" stroke-width="1"/>
  <text x="62" y="472" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="10" fill="#6b7280">Input</text>
  <circle cx="100" cy="468" r="5" fill="rgba(237,233,254,0.7)" stroke="#1a1a1a" stroke-width="1"/>
  <text x="110" y="472" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="10" fill="#6b7280">AI Processing</text>
  <circle cx="206" cy="468" r="5" fill="rgba(254,243,199,0.7)" stroke="#1a1a1a" stroke-width="1"/>
  <text x="216" y="472" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="10" fill="#6b7280">Code Decision</text>
  <circle cx="302" cy="468" r="5" fill="rgba(220,252,231,0.7)" stroke="#1a1a1a" stroke-width="1"/>
  <text x="312" y="472" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="10" fill="#6b7280">Approved / Output</text>
  <circle cx="416" cy="468" r="5" fill="rgba(254,226,226,0.7)" stroke="#1a1a1a" stroke-width="1"/>
  <text x="426" y="472" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="10" fill="#6b7280">Blocked</text>
</svg>
