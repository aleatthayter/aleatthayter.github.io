<svg width="760" height="530" viewBox="0 0 760 530" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="760" height="530" fill="white"/>

  <!-- Controlled Documents -->
  <rect x="180" y="12" width="400" height="62" rx="12" fill="rgba(219,234,254,0.7)" stroke="#1a1a1a" stroke-width="1.5"/>
  <g transform="translate(196,23)">
    <rect width="14" height="18" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1.3"/>
    <line x1="3" y1="6" x2="11" y2="6" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="3" y1="10" x2="11" y2="10" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="3" y1="14" x2="9" y2="14" stroke="#1a1a1a" stroke-width="1"/>
  </g>
  <text x="390" y="38" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#111827">Controlled Documents</text>
  <text x="390" y="57" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="11" fill="#4b5563">Procedures, permit conditions, safety protocols</text>

  <!-- Arrow -->
  <line x1="380" y1="74" x2="380" y2="90" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Chunk & Index into Vector Store -->
  <rect x="180" y="93" width="400" height="62" rx="12" fill="rgba(237,233,254,0.7)" stroke="#1a1a1a" stroke-width="1.5"/>
  <g transform="translate(193,104)">
    <polygon points="10,0 12,8 20,10 12,12 10,20 8,12 0,10 8,8" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>
  </g>
  <text x="390" y="119" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#111827">Chunk &amp; Index into Vector Store</text>
  <text x="390" y="138" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="11" fill="#4b5563">ChromaDB: semantic embeddings for retrieval</text>

  <!-- Arrow -->
  <line x1="380" y1="155" x2="380" y2="171" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Worker Asks Question -->
  <rect x="180" y="174" width="400" height="62" rx="12" fill="rgba(219,234,254,0.7)" stroke="#1a1a1a" stroke-width="1.5"/>
  <g transform="translate(194,185)">
    <circle cx="10" cy="7" r="6" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M1,26 Q1,18 10,18 Q19,18 19,26" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
  <text x="390" y="200" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#111827">Worker Asks a Plain-Language Question</text>
  <text x="390" y="219" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="11" fill="#4b5563">No system knowledge required: ask in natural language</text>

  <!-- Arrow -->
  <line x1="380" y1="236" x2="380" y2="252" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Retrieve Relevant Sections -->
  <rect x="180" y="255" width="400" height="62" rx="12" fill="rgba(204,251,241,0.7)" stroke="#1a1a1a" stroke-width="1.5"/>
  <g transform="translate(193,266)">
    <circle cx="8" cy="8" r="7" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="13" y1="13" x2="19" y2="19" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="390" y="281" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#111827">Retrieve Relevant Document Sections</text>
  <text x="390" y="300" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="11" fill="#4b5563">Semantic search: most relevant chunks surfaced</text>

  <!-- Arrow -->
  <line x1="380" y1="317" x2="380" y2="333" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- AI Answers from Documents Only -->
  <rect x="180" y="336" width="400" height="62" rx="12" fill="rgba(237,233,254,0.7)" stroke="#1a1a1a" stroke-width="1.5"/>
  <g transform="translate(193,347)">
    <polygon points="10,0 12,8 20,10 12,12 10,20 8,12 0,10 8,8" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>
  </g>
  <text x="390" y="362" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#111827">AI Answers from Documents Only</text>
  <text x="390" y="381" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="11" fill="#4b5563">Cites source document and section; no inference beyond text</text>

  <!-- Two-way split -->
  <line x1="380" y1="398" x2="380" y2="410" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="190" y1="410" x2="550" y2="410" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="190" y1="410" x2="190" y2="424" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="550" y1="410" x2="550" y2="424" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Answer with Citation -->
  <rect x="20" y="427" width="340" height="62" rx="12" fill="rgba(220,252,231,0.7)" stroke="#1a1a1a" stroke-width="1.5"/>
  <g transform="translate(34,437)">
    <circle cx="10" cy="10" r="9" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <polyline points="4,10 8,14 16,6" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  </g>
  <text x="190" y="453" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#111827">Answer with Citation</text>
  <text x="190" y="472" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="11" fill="#4b5563">Source document and section referenced</text>

  <!-- Refuse if Not in Documents -->
  <rect x="380" y="427" width="340" height="62" rx="12" fill="rgba(254,243,199,0.7)" stroke="#1a1a1a" stroke-width="1.5"/>
  <g transform="translate(394,437)">
    <circle cx="10" cy="10" r="9" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="10" y1="5" x2="10" y2="12" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="10" cy="16" r="1.5" fill="#1a1a1a"/>
  </g>
  <text x="550" y="453" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#111827">Refuse if Not in Documents</text>
  <text x="550" y="472" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="11" fill="#4b5563">Directs worker to supervisor: no improvised answers</text>

  <!-- Legend -->
  <text x="20" y="520" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="10" font-weight="600" fill="#6b7280">Key</text>
  <circle cx="52" cy="516" r="5" fill="rgba(219,234,254,0.7)" stroke="#1a1a1a" stroke-width="1"/>
  <text x="62" y="520" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="10" fill="#6b7280">Input / Data</text>
  <circle cx="140" cy="516" r="5" fill="rgba(237,233,254,0.7)" stroke="#1a1a1a" stroke-width="1"/>
  <text x="150" y="520" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="10" fill="#6b7280">AI Processing</text>
  <circle cx="238" cy="516" r="5" fill="rgba(204,251,241,0.7)" stroke="#1a1a1a" stroke-width="1"/>
  <text x="248" y="520" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="10" fill="#6b7280">Tool / Retrieval</text>
  <circle cx="336" cy="516" r="5" fill="rgba(220,252,231,0.7)" stroke="#1a1a1a" stroke-width="1"/>
  <text x="346" y="520" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="10" fill="#6b7280">Output</text>
  <circle cx="400" cy="516" r="5" fill="rgba(254,243,199,0.7)" stroke="#1a1a1a" stroke-width="1"/>
  <text x="410" y="520" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" font-size="10" fill="#6b7280">Refusal / Decision</text>
</svg>
